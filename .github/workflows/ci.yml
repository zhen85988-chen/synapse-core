name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: Ruff check (auto-fix, then verify)
        run: |
          ruff check . --fix 2>&1 || true
          ruff format --check .
          OUTPUT=$(ruff check . --output-format concise 2>&1) || true
          BLOCKING=$(echo "$OUTPUT" | grep -vE 'E402|E701|F841|^$' || true)
          if [ -n "$BLOCKING" ]; then
            echo "BLOCKING errors:"
            echo "$BLOCKING"
            exit 1
          fi
          echo "$OUTPUT" | grep -q . && echo "Non-blocking style notes:" && echo "$OUTPUT" || echo "Lint clean"

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mcp pytest pytest-timeout
      - name: Run tests
        run: |
          python -m pytest test_memory.py -v --timeout=30
